<div class="overflow-x-hidden scroll-smooth text-foreground min-h-screen flex flex-col items-center justify-center px-6 py-14 overflow-y-auto">
  <div class="max-w-6xl w-full flex relative mx-auto flex-col sm:flex-row items-start gap-10">
    <div class="relative flex-1">
      <div class="absolute inset-y-0 left-0 w-1 bg-line rounded-full"></div>
      <div class="pl-10">
        <p class="text-sm uppercase tracking-[0.35em] text-accent font-semibold mb-4">
          {{ 'skills.title' | translate }}
        </p>
        <h2 class="text-4xl md:text-5xl font-extrabold mb-6">
          {{ 'skills.subtitle' | translate }}
        </h2>
        <p class="max-w-2xl text-base text-slate-300 leading-8">
          {{ 'skills.description' | translate }}
        </p>
      </div>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-8 flex-1">
      <ng-container *ngFor="let skill of skills">
        <div class="flex flex-col items-center group">
          <div
            class="w-16 h-16 rounded-full bg-skill-icon flex items-center justify-center mb-3 transition-transform duration-300 group-hover:scale-110 group-hover:shadow-lg"
          >
            <img [src]="skill.icon" [alt]="skill.altKey | translate" class="w-10 h-10" />
          </div>
          <span class="text-sm font-medium text-center">{{ skill.labelKey | translate }}</span>
        </div>
      </ng-container>
    </div>
  </div>
</div>
