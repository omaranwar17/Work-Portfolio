<div class="text-foreground font-sans px-6 md:px-24 overflow-hidden">

  <section
    class="flex flex-col items-start gap-6 mt-28 md:mt-36 text-left header animate-fadeIn"
  >

    <!-- Tagline -->
    <p
      class="text-accent uppercase tracking-[0.35em] text-xs md:text-sm font-semibold animate-slideUp"
    >
      {{ 'home.tagline' | translate }}
    </p>

    <!-- Greeting -->
    <h2
      class="text-3xl md:text-5xl font-bold leading-tight animate-slideUp delay-100"
    >
      {{ 'home.greeting' | translate }}

      <span
        class="bg-accent px-4 py-1 rounded-full text-badge-on-accent inline-block hover:scale-105 transition-transform duration-300"
      >
        {{ 'home.name' | translate }}
      </span>
    </h2>


    <h1
  class="text-md sm:text-2xl md:text-6xl
  font-extrabold leading-[1.4]
  

  break-words
  max-w-4xl

  animate-slideUp delay-200"
>
  {{ 'home.headline' | translate }}
</h1>

    <!-- Description -->
    <p
      class="max-w-3xl sm:text-md text-base md:text-lg text-slate-300 leading-8 animate-slideUp delay-300"
    >
      {{ 'home.description' | translate }}
    </p>

    <!-- Buttons -->
    <div
      class="flex flex-wrap gap-4 animate-slideUp delay-500"
    >

     <a
  routerLink="/projects"
  class="group inline-flex items-center justify-center
  rounded-full bg-accent px-7 py-3
  text-black font-semibold
  transition-all duration-300
  hover:scale-105">

  {{ 'home.ctaProjects' | translate }}

  <i
    class="fa-solid fa-arrow-right ms-2
    transition-transform duration-300
    group-hover:translate-x-1">
  </i>

</a>

<a
  href="assets/omarAlkerm-cv.pdf"
  target="_blank"
  class="group inline-flex items-center justify-center
  rounded-full bg-gray-200/50
  px-7 py-3
  text-black dark:text-white
  font-semibold
  transition-all duration-300
  hover:scale-105">

  <i
    class="fa-solid fa-download me-2
    transition-transform duration-300
    group-hover:-translate-y-1
    group-hover:rotate-6">
  </i>

  {{ 'home.ctaCv' | translate }}

</a>

    </div>

  </section>

</div>
