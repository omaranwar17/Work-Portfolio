<div class="text-foreground pt-6 w-full">
  <nav class="w-8/12 mx-auto">
    <div class="flex justify-between items-center py-2 px-1 md:px-0 w-full gap-2">
      <button
        type="button"
        (click)="toggleMenu()"
        class="md:hidden focus:outline-none"
        aria-label="Toggle menu"
      >
        <svg
          class="w-6 h-6 text-menu-accent"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        </svg>
      </button>
      <div class="hidden md:block flex-1" aria-hidden="true"></div>
      <button
        type="button"
        (click)="toggleTheme()"
        class="rounded-full p-2 text-menu-accent hover:opacity-90 focus:outline-none focus-visible:ring-2 focus-visible:ring-accent"
        [attr.aria-label]="theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        [attr.aria-pressed]="theme() === 'dark'"
      >
        <i
          class="fa-solid text-lg"
          [ngClass]="theme() === 'dark' ? 'fa-sun' : 'fa-moon'"
          aria-hidden="true"
        ></i>
      </button>
    </div>

    <ul
      [ngClass]="{
        hidden: !isMenuOpen,
        flex: isMenuOpen,
      }"
      class="flex-col items-center md:flex md:flex-row md:justify-evenly gap-3 w-8/12 mx-auto text-sm font-bold bg-nav-surface rounded-lg px-3 py-1"
    >
      <li>
        <a
          routerLink="/home"
          routerLinkActive="bg-accent hover:text-accent-contrast"
          [routerLinkActiveOptions]="{ exact: true }"
          class="block px-3 py-1 rounded-full text-nav-link transition-colors duration-300"
          >Home</a
        >
      </li>
      <li>
        <a
          routerLink="/about"
          routerLinkActive="bg-accent hover:text-accent-contrast"
          class="block px-3 py-1 rounded-full text-nav-link transition-colors duration-300"
          >About</a
        >
      </li>
      <li>
        <a
          routerLink="/skills"
          routerLinkActive="bg-accent hover:text-accent-contrast"
          class="block px-3 py-1 rounded-full text-nav-link transition-colors duration-300"
          >Skills</a
        >
      </li>
      <li>
        <a
          routerLink="/contact"
          routerLinkActive="bg-accent hover:text-accent-contrast"
          class="block px-3 py-1 rounded-full text-nav-link transition-colors duration-300"
          >Contact</a
        >
      </li>
    </ul>
  </nav>
</div>
