<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navigation Page</title>

   
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0d0d0d;
      }
    </style>
  </head>
  <body class="text-white pt-6">

<nav class="w-8/12 mx-auto">
  <div class="flex justify-between py-2 px-1 md:px-0">
    <button (click)="toggleMenu()" class="md:hidden focus:outline-none" aria-label="Toggle menu">
      <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>
  </div>

  <ul
    [ngClass]="{
      'hidden': !isMenuOpen,
      'flex': isMenuOpen
    }"
    class="flex-col items-center md:flex md:flex-row md:justify-evenly gap-3 w-8/12 mx-auto text-sm font-bold bg-white rounded-lg px-3 py-1"
  >
    <li>
      <a
        routerLink="/home"
        routerLinkActive="bg-yellow-400 hover:text-black"
        [routerLinkActiveOptions]="{ exact: true }"
        class="block px-3 py-1 rounded-full text-black transition-colors duration-300"
      >Home</a>
    </li>
    <li>
      <a
        routerLink="/about"
        routerLinkActive="bg-yellow-400 hover:text-black"
        class="block px-3 py-1 rounded-full text-black transition-colors duration-300"
      >About</a>
    </li>
    <li>
      <a
        routerLink="/skills"
        routerLinkActive="bg-yellow-400 hover:text-black"
        class="block px-3 py-1 rounded-full text-black transition-colors duration-300"
      >Skills</a>
    </li>
    <li>
      <a
        routerLink="/contact"
        routerLinkActive="bg-yellow-400 hover:text-black"
        class="block px-3 py-1 rounded-full text-black transition-colors duration-300"
      >Contact</a>
    </li>
  </ul>
</nav>














  </body>
</html>
