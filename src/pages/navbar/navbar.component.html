<div class="text-foreground pt-6 w-full  transition-all duration-300">
  <nav class="w-full md:w-8/12 mx-auto">
    <div class="flex flex-wrap justify-between items-center py-2 px-3 md:px-1 md:px-0 gap-2">
      <button
        type="button"
        (click)="toggleMenu()"
        class="md:hidden rounded-full border border-white/10 bg-nav-surface p-2 text-menu-accent shadow-sm transition hover:bg-nav-surface/90 focus:outline-none focus-visible:ring-2 focus-visible:ring-accent"
        [attr.aria-label]="'navbar.toggleMenu' | translate"
        [attr.aria-expanded]="isMenuOpen"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>

      <div class="flex items-center gap-2">
        <div class="inline-flex items-center gap-1 rounded-full bg-nav-surface/90 px-1 py-1 shadow-sm ring-1 ring-slate-900/10 backdrop-blur-sm">
          <button
            *ngFor="let lang of availableLanguages()"
            type="button"
            (click)="setLanguage(lang)"
            [attr.aria-label]="'navbar.languageLabel' | translate"
            [ngClass]="{
              'bg-accent text-accent-contrast shadow-lg': lang === currentLang(),
              'text-slate-700 dark:text-slate-200 hover:bg-white/10': lang !== currentLang()
            }"
            class="rounded-full px-3 py-1 text-xs font-semibold transition duration-300"
          >
            {{ lang === 'en' ? 'EN' : 'ع' }}
          </button>
        </div>

        <button
          type="button"
          (click)="toggleTheme()"
          class="rounded-full p-2 text-menu-accent hover:opacity-90 focus:outline-none focus-visible:ring-2 focus-visible:ring-accent"
          [attr.aria-label]="
            theme() === 'dark'
              ? ('navbar.themeSwitchLight' | translate)
              : ('navbar.themeSwitchDark' | translate)
          "
          [attr.aria-pressed]="theme() === 'dark'"
        >
          <i class="fa-solid text-lg" [ngClass]="theme() === 'dark' ? 'fa-sun' : 'fa-moon'" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <ul
      [ngClass]="{
        hidden: !isMenuOpen,
        flex: isMenuOpen,
        'md:flex-row-reverse': isRtl(),
        'md:flex-row': !isRtl(),
        'md:text-right': isRtl(),
        'md:text-left': !isRtl()
      }"
      class="flex-col items-center md:flex md:justify-evenly gap-3 w-full md:w-8/12 mx-auto text-sm font-bold bg-nav-surface  rounded-lg px-3 py-1 transition-all duration-300"
    >
      <li class="w-full md:w-auto">
        <a
          routerLink="/home"
          routerLinkActive="bg-accent"
          [routerLinkActiveOptions]="{ exact: true }"
          class="block w-full px-3 py-2 rounded-full  leading-tight transition-colors duration-300"
          >{{ 'navbar.home' | translate }}</a
        >
      </li>
      <li class="w-full md:w-auto">
        <a
          routerLink="/about"
          routerLinkActive="bg-accent "
          class="block w-full px-3 py-2 rounded-full  leading-tight transition-colors duration-300"
          >{{ 'navbar.about' | translate }}</a
        >
      </li>
      <li class="w-full md:w-auto">
        <a
          routerLink="/skills"
          routerLinkActive="bg-accent "
          class="block w-full px-3 py-2 rounded-full  leading-tight transition-colors duration-300"
          >{{ 'navbar.skills' | translate }}</a
        >
      </li>
      <li class="w-full md:w-auto">
        <a
          routerLink="/projects"
          routerLinkActive="bg-accent"
          class="block w-full px-3 py-2 rounded-full  leading-tight  transition-colors duration-300"
          >{{ 'navbar.projects' | translate }}</a
        >
      </li>
      <li class="w-full md:w-auto">
        <a
          routerLink="/contact"
          routerLinkActive="bg-accent "
          class="block w-full px-3 py-2 rounded-full  leading-tight  transition-colors duration-300"
          >{{ 'navbar.contact' | translate }}</a
        >
      </li>
    </ul>
  </nav>
</div>
