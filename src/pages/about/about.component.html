<div class="text-foreground m-0 p-0 overflow-x-hidden">

  <div
    class="flex flex-col md:flex-row justify-between items-center
    px-4 sm:px-6 md:px-24 gap-10 relative z-10">

    <!-- Text Section -->
    <div
      class="w-full md:w-2/3 max-w-2xl py-10
      animate-fade-in-up">

      <p class="text-sm uppercase tracking-[0.3em] text-accent font-semibold mb-4">
        {{ 'about.title' | translate }}
      </p>

      <p class="text-base sm:text-lg leading-tight ">
        {{ 'about.intro' | translate }}
      </p>

      <button
        (click)="showDialog = true"
        class="mt-6 sm:mt-8 px-6 py-3
        border border-border text-foreground font-bold
        rounded-xl hover:bg-accent hover:text-white
        transition-all duration-300 hover:scale-105 shadow-md">

        {{ 'about.resumeButton' | translate }}
      </button>

      <!-- Dialog -->
      <div
        *ngIf="showDialog"
        class="fixed inset-0 bg-black/40 backdrop-blur-sm
        flex items-center justify-center z-50">

        <div
          class="bg-white dark:bg-slate-900
          rounded-2xl p-8 w-[90%] max-w-md
          shadow-2xl border border-gray-200 dark:border-white/10
          animate-scale-in">

          <h2 class="text-2xl font-semibold mb-4 text-center text-gray-600 dark:text-gray-300">
            {{ 'about.dialogTitle' | translate }}
          </h2>

          <p class="mb-6 text-center text-gray-600 dark:text-gray-300">
            {{ 'about.dialogBody' | translate }}
          </p>

          <div class="flex justify-center gap-4">

            <button
              (click)="openCV()"
              class="bg-green-600 hover:bg-green-700 text-white
              px-5 py-2 rounded-full transition hover:scale-105">

              {{ 'about.viewCV' | translate }}
            </button>

            <button
              (click)="showDialog = false"
              class="bg-gray-500 hover:bg-gray-600 text-white
              px-5 py-2 rounded-full transition hover:scale-105">

              {{ 'about.cancel' | translate }}
            </button>

          </div>

        </div>

      </div>

    </div>

    <!-- Image Section -->
    <div
      class="w-3/4 sm:w-2/3 md:w-1/3 py-10 flex justify-center">

      <div
        class="relative group animate-fade-in-right">

        <!-- Glow effect -->
        <div
          class="absolute -inset-1 bg-gradient-to-r
          from-blue-500 via-purple-500 to-pink-500
          rounded-2xl blur opacity-40 group-hover:opacity-70
          transition duration-500">
        </div>

        <!-- Image Card -->
        <div
          class="relative rounded-2xl overflow-hidden
          shadow-2xl border border-white/20
          transform group-hover:scale-105
          transition duration-500">

          <img
            src="../../assets/WhatsApp Image 2025-05-25 at 20.17.23_1a247cc5.jpg"
            alt="Omar"
            class="w-full h-full object-cover">

        </div>

      </div>

    </div>

  </div>

</div>
