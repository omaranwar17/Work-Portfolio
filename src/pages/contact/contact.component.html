<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - Youssef</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0d0d0d;
    }
  </style>
</head>
<body class="bg-black text-white flex flex-col items-center justify-start min-h-screen px-6 pt-24 overflow-y-hidden">

  
  <div class="text-center mb-8">
    <h1 class="text-4xl font-extrabold mb-2 uppercase leading-tight">
      LET'S TALK ABOUT<br/>THE NEXT BIG THING
    </h1>
    <div class="mx-auto bg-white h-[2px] w-56 mb-8"></div> <!-- خط تحت العنوان -->
  </div>

  
  <div class="flex flex-col md:flex-row gap-8 mb-12">
    <button
    (click)="openGmail()"
    
        
      class="w-64 bg-black border border-white text-white px-6 py-4 rounded-full font-bold text-lg hover:bg-yellow-400 hover:text-white transition"
    >
    Write a gamil
      
    </button>
    <button
      (click)="openLinkedIn()"
      class="w-64 bg-black border border-white text-white px-6 py-4 rounded-full font-bold text-lg hover:bg-yellow-400 hover:text-white transition flex items-center justify-center"
    >
      LinkedIn
    </button>
  </div>

  
  <div class="space-y-4 text-center md:text-left max-w-sm">
    <div class="flex items-center justify-center md:justify-start gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 12.414a4 4 0 10-5.657 5.657l4.243 4.243a4 4 0 005.657-5.657z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      <span>Egypt, Damietta</span>
    </div>
    <div class="flex items-center justify-center md:justify-start gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h2l3 6 4-8 3 6h4" />
      </svg>
      <span>+20 1024915651</span>
    </div>
  </div>

</body>
</html>
